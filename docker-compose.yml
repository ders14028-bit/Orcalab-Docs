version: "3.9"

# Docker Compose RAÍZ de OrcaLab — levanta el sistema completo (7 servicios + infra)
# para la demo de sustentación. Cada repo de servicio se clona como carpeta hermana
# de este repo (orcalab-docs), es decir, todos bajo el mismo directorio padre:
#
#   proyectos/
#     orcalab-docs/            <- este repo
#     orcalab-auth-service/
#     orcalab-room-service/
#     orcalab-realtime-service/
#     orcalab-reporting-service/
#     orcalab-observability-service/
#     orcalab-api-gateway/
#     orcalab-frontend/
#
# Uso: desde orcalab-docs/  ->  docker compose up --build

services:

  # ---------- INFRAESTRUCTURA ----------
  postgres-auth:
    image: postgres:16
    environment:
      POSTGRES_DB: auth_db
      POSTGRES_USER: orcalab
      POSTGRES_PASSWORD: orcalab
    ports:
      - "5432:5432"
    volumes:
      - postgres_auth_data:/var/lib/postgresql/data

  postgres-room:
    image: postgres:16
    environment:
      POSTGRES_DB: room_db
      POSTGRES_USER: orcalab
      POSTGRES_PASSWORD: orcalab
    ports:
      - "5433:5432"
    volumes:
      - postgres_room_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./infra/prometheus.yml:/etc/prometheus/prometheus.yml

  loki:
    image: grafana/loki:latest
    ports:
      - "3100:3100"

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3001:3000"
    depends_on:
      - prometheus
      - loki

  # ---------- MICROSERVICIOS (carpetas hermanas) ----------
  auth-service:
    build: ../orcalab-auth-service
    ports:
      - "8081:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-auth:5432/auth_db
    depends_on:
      - postgres-auth

  room-service:
    build: ../orcalab-room-service
    ports:
      - "8082:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-room:5432/room_db
    depends_on:
      - postgres-room

  realtime-service:
    build: ../orcalab-realtime-service
    ports:
      - "8083:8080"
    environment:
      SPRING_REDIS_HOST: redis
      SPRING_DATA_MONGODB_URI: mongodb://mongo:27017/orcalab_realtime
    depends_on:
      - redis
      - mongo

  reporting-service:
    build: ../orcalab-reporting-service
    ports:
      - "8084:8080"
    depends_on:
      - postgres-auth
      - postgres-room
      - mongo
      - redis

  observability-service:
    build: ../orcalab-observability-service
    ports:
      - "8085:8080"
    depends_on:
      - prometheus
      - loki

  api-gateway:
    build: ../orcalab-api-gateway
    ports:
      - "8080:8080"
    depends_on:
      - auth-service
      - room-service
      - realtime-service
      - reporting-service
      - observability-service

  frontend:
    build: ../orcalab-frontend
    ports:
      - "3000:80"
    depends_on:
      - api-gateway

volumes:
  postgres_auth_data:
  postgres_room_data:
  mongo_data:
